name: C#

on:
  pull_request:
    branches:
      - main
      - 'maint-*'
    paths:
      - '.github/workflows/csharp.yml'
      - 'csharp/**'
  push:
    branches:
      - main
      - 'maint-*'
    paths:
      - '.github/workflows/csharp.yml'
      - 'csharp/**'

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  csharp:
    name: "C# ${{ matrix.os }} .NET ${{ matrix.dotnet }}"
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.pull_request.title, 'WIP') }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
          - macos-15-intel  # Intel
          - macos-latest  # ARM
        dotnet:
          - '8.0.x'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Build
        shell: bash
        run: |
          ./ci/scripts/csharp_build.sh "${{ github.workspace }}"

      - name: Test
        shell: bash
        run: |
          ./ci/scripts/csharp_test.sh "${{ github.workspace }}"

  coverage:
    name: "Driver coverage (report-only)"
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, 'WIP') }}
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Setup .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: |
          ./ci/scripts/csharp_build.sh "${{ github.workspace }}"

      - name: Collect coverage
        # Coverage is informational only — failures here should not block CI.
        continue-on-error: true
        run: |
          ./ci/scripts/csharp_coverage.sh "${{ github.workspace }}"

      - name: Upload cobertura report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: driver-coverage-cobertura
          path: ${{ github.workspace }}/coverage/coverage.cobertura.xml
          if-no-files-found: warn
